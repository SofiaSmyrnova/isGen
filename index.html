<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Analyzer</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <image class="logo" src="/static/logo.png" alt="Logo">
  <nav>
    <a href="#">Main</a>
    <a href="#">About Project</a>
    <a href="#">Creator</a>
  </nav>
</header>

<div class="page-title">
  <h1>єGen</h1>
  <span>Codon Analysis Tool</span>
</div>

<main>
  <section class="panel-left">
    <div>
      <div class="label">Enter DNA sequence</div>
      <textarea id="dna" placeholder="ATGCGATACGTTAG..."></textarea>
    </div>
    <div class="meta-row" id="metaRow" style="display:none">
      <div class="meta-chip">Length <strong id="mLen">—</strong></div>
      <div class="meta-chip">Codons <strong id="mCodons">—</strong></div>
      <div class="meta-chip">GC% <strong id="mGC">—</strong></div>
    </div>
    <div style="display:flex; align-items:center;">
      <button id="analyzeBtn" onclick="go()">Analyze</button>
      <span class="spinner" id="spinner"></span>
    </div>
  </section>

  <section class="panel-right">
    <div class="results-placeholder" id="placeholder">
      <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="8" y="8" width="48" height="48" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <line x1="20" y1="24" x2="44" y2="24" stroke="currentColor" stroke-width="1.5"/>
        <line x1="20" y1="32" x2="38" y2="32" stroke="currentColor" stroke-width="1.5"/>
        <line x1="20" y1="40" x2="42" y2="40" stroke="currentColor" stroke-width="1.5"/>
      </svg>
      <p>Awaiting sequence</p>
    </div>
    <div class="results-inner" id="results"></div>
  </section>
</main>

<script src="/static/script.js"></script>
</body>
</html>
